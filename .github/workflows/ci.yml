name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m py_compile tg_maintenance.py tg_contacts_backup.py
      - run: TELEGRAM_API_ID=1 TELEGRAM_API_HASH=test python tg_maintenance.py --help
      - run: python tg_contacts_backup.py --help
